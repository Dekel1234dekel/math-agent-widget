<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סוכן מתמטיקה לכיתות ה׳–ו׳</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5fb;
      color: #1f2a44;
    }

    .container {
      max-width: 900px;
      margin: 24px auto;
      background: #ffffff;
      border: 1px solid #d9e0f2;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(31, 42, 68, 0.08);
    }

    .header {
      padding: 24px;
      background: #eef2ff;
      border-bottom: 1px solid #d9e0f2;
    }

    .title {
      margin: 0 0 8px;
      font-size: 30px;
      color: #243b80;
    }

    .subtitle {
      margin: 0;
      color: #5b6785;
      font-size: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid #e6ebf8;
      background: #fafbff;
    }

    .toolbar label,
    .toolbar select,
    .toolbar button,
    .toolbar input[type="file"] {
      font-size: 15px;
    }

    .toolbar select,
    .toolbar button {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #cfd7ee;
      background: white;
      cursor: pointer;
    }

    .toolbar button.primary {
      background: #5b5bf0;
      color: white;
      border-color: #5b5bf0;
    }

    .chat {
      height: 420px;
      overflow-y: auto;
      padding: 20px;
      background: #ffffff;
    }

    .message {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message.user {
      align-items: flex-start;
    }

    .message.assistant {
      align-items: flex-end;
    }

    .bubble {
      max-width: 85%;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .user .bubble {
      background: #eef2ff;
      color: #1f2a44;
    }

    .assistant .bubble {
      background: #f7f8fc;
      color: #1f2a44;
      border: 1px solid #e3e7f3;
    }

    .composer {
      padding: 16px 20px 20px;
      border-top: 1px solid #e6ebf8;
      background: #fafbff;
    }

    .composer-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    textarea {
      flex: 1;
      min-height: 88px;
      resize: vertical;
      border: 1px solid #cfd7ee;
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      font-family: inherit;
      direction: rtl;
    }

    .send-btn {
      min-width: 110px;
      border: none;
      border-radius: 16px;
      background: #5b5bf0;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 0 20px;
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #65708c;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #4f46e5;
    }

    img.preview {
      max-width: 220px;
      border-radius: 12px;
      border: 1px solid #d9e0f2;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">סוכן מתמטיקה לכיתות ה׳–ו׳</h1>
      <p class="subtitle">פינג־פונג, הסבר פשוט, הצגת ביטויים משמאל לימין ושברים תקינים</p>
    </div>

    <div class="toolbar">
      <label for="modeSelect">מצב:</label>
      <select id="modeSelect">
        <option value="api">API</option>
        <option value="demo">Demo</option>
      </select>

      <label for="gradeSelect">כיתה:</label>
      <select id="gradeSelect">
        <option value="">לא ידוע</option>
        <option value="ה">ה׳</option>
        <option value="ו">ו׳</option>
      </select>

      <button id="clearBtn" type="button">ניקוי שיחה</button>
      <input id="imageInput" type="file" accept="image/*" />
    </div>

    <div id="chat" class="chat"></div>

    <div class="composer">
      <div class="composer-row">
        <textarea id="userInput" placeholder="כתבי כאן שאלה או בקשי עזרה בתרגיל..."></textarea>
        <button id="sendBtn" class="send-btn" type="button">שליחה</button>
      </div>
      <div id="status" class="status"></div>
      <div class="hint">אפשר גם להעלות תמונה של תרגיל.</div>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const userInputEl = document.getElementById("userInput");
    const sendBtnEl = document.getElementById("sendBtn");
    const modeSelectEl = document.getElementById("modeSelect");
    const gradeSelectEl = document.getElementById("gradeSelect");
    const clearBtnEl = document.getElementById("clearBtn");
    const imageInputEl = document.getElementById("imageInput");
    const statusEl = document.getElementById("status");

    let conversationHistory = [];
    let selectedImageDataUrl = "";

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function addMessage(role, text, imageUrl = "") {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = escapeHtml(text);

      wrapper.appendChild(bubble);

      if (imageUrl) {
        const image = document.createElement("img");
        image.className = "preview";
        image.src = imageUrl;
        image.alt = "תמונה שהועלתה";
        wrapper.appendChild(image);
      }

      chatEl.appendChild(wrapper);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function resetImageInput() {
      imageInputEl.value = "";
      selectedImageDataUrl = "";
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handleImageChange(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        selectedImageDataUrl = "";
        return;
      }

      try {
        selectedImageDataUrl = await fileToDataUrl(file);
        setStatus("התמונה נטענה בהצלחה.");
      } catch (error) {
        console.error(error);
        setStatus("לא הצלחתי לטעון את התמונה.");
        selectedImageDataUrl = "";
      }
    }

    function getDemoReply(userText) {
      const lower = userText.trim();

      if (!lower) {
        return "כתבי לי שאלה, ואני אתחיל איתך מהצעד הראשון.";
      }

      if (lower.includes("תפתור")) {
        return "אני אעזור לך לפתור, אבל נתחיל יחד בצעד הראשון. מה הפעולה שאתה מזהה בתרגיל?";
      }

      return "בואי נחשוב יחד. מה נראה לך הצעד הראשון?";
    }

    async function getAgentReplyFromApi() {
      const userText = userInputEl.value.trim();

      const userMessageContent = selectedImageDataUrl
        ? `${userText}\n\n[התלמיד העלה תמונה]`
        : userText;

      conversationHistory.push({
        role: "user",
        content: userMessageContent
      });

      addMessage("user", userText || "הועלתה תמונה", selectedImageDataUrl);

      const body = {
        history: conversationHistory,
        studentProfile: {
          grade: gradeSelectEl.value || ""
        },
        imageContext: {
          hasImage: Boolean(selectedImageDataUrl),
          hasMultipleQuestions: false
        }
      };

      const response = await fetch("/api/math-agent", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

     const data = await response.json();
console.log("API RESPONSE:", data);

const text =
  data.output_text ||
  data.output?.[0]?.content?.[0]?.text ||
  "לא התקבלה תשובה";
      
      if (!response.ok) {
        throw new Error(data.text || "שגיאה בשרת");
      }

     const assistantText = text;
      conversationHistory.push({
        role: "assistant",
        content: assistantText
      });

      addMessage("assistant", assistantText);
    }

    async function sendMessage() {
      const userText = userInputEl.value.trim();

      if (!userText && !selectedImageDataUrl) {
        setStatus("צריך לכתוב שאלה או להעלות תמונה.");
        return;
      }

      sendBtnEl.disabled = true;
      setStatus("חושב...");

      try {
        if (modeSelectEl.value === "demo") {
          addMessage("user", userText || "הועלתה תמונה", selectedImageDataUrl);
          const demoReply = getDemoReply(userText);
          addMessage("assistant", demoReply);
        } else {
          await getAgentReplyFromApi();
        }

        userInputEl.value = "";
        resetImageInput();
        setStatus("");
      } catch (error) {
        console.error(error);
        addMessage("assistant", "הייתה שגיאה. נסי שוב בעוד רגע.");
        setStatus("הייתה תקלה בשליחה.");
      } finally {
        sendBtnEl.disabled = false;
      }
    }

    sendBtnEl.addEventListener("click", sendMessage);

    userInputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    clearBtnEl.addEventListener("click", () => {
      conversationHistory = [];
      chatEl.innerHTML = "";
      userInputEl.value = "";
      resetImageInput();
      setStatus("השיחה נוקתה.");
    });

    imageInputEl.addEventListener("change", handleImageChange);
  </script>
</body>
</html>
