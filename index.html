<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>רכיב סוכן מתמטיקה</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --border: #d9deea;
      --text: #1f2a44;
      --muted: #68738d;
      --brand: #4f46e5;
      --brand-2: #eef2ff;
      --student: #f0fdf4;
      --agent: #ffffff;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(31, 42, 68, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8f9ff, #f4f7fb);
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .widget {
      width: min(100%, 920px);
      height: min(92vh, 820px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #eef2ff, #ffffff);
      border-bottom: 1px solid var(--border);
    }

    .title-wrap { display: flex; gap: 12px; align-items: center; }
    .badge {
      width: 44px; height: 44px; border-radius: 14px;
      display: grid; place-items: center; font-size: 24px;
      background: var(--brand-2); border: 1px solid #c7d2fe;
    }
    .title { margin: 0; font-size: 22px; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

    .controls {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }

    .btn, .upload-label, select {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      cursor: pointer;
    }
    .btn.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .upload-label input { display: none; }

    .chat {
      padding: 18px;
      overflow: auto;
      background:
        radial-gradient(circle at top right, rgba(79, 70, 229, 0.05), transparent 25%),
        linear-gradient(180deg, #fbfcff, #f8fafc);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: min(92%, 720px);
      padding: 14px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px rgba(31, 42, 68, 0.04);
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .msg.student {
      align-self: flex-start;
      background: var(--student);
      border-color: #bbf7d0;
    }
    .msg.agent {
      align-self: flex-end;
      background: var(--agent);
    }
    .msg.system {
      align-self: center;
      background: #fff7ed;
      border-color: #fed7aa;
      color: #7c2d12;
      max-width: 100%;
    }

    .sender {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .math-block {
      direction: ltr;
      unicode-bidi: isolate;
      display: inline-block;
      padding: 6px 10px;
      margin: 6px 0;
      background: #f8fafc;
      border: 1px solid #dbe4f0;
      border-radius: 10px;
      font-size: 24px;
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    .mixed-number {
      direction: ltr;
      unicode-bidi: isolate;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 6px 0;
      font-size: 28px;
      font-weight: 700;
    }
    .fraction {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      min-width: 1.4em;
    }
    .fraction .bar {
      width: 100%;
      border-top: 2px solid #111827;
      margin: 2px 0;
    }

    .fraction-word {
      direction: rtl;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      margin: 6px 0;
      font-weight: 700;
    }

    .fraction-visual {
      direction: ltr;
      unicode-bidi: isolate;
      margin: 10px 0;
      display: grid;
      gap: 8px;
      width: fit-content;
    }
    .rect-row {
      display: flex;
      gap: 0;
      border: 2px solid #334155;
      width: fit-content;
      background: #fff;
    }
    .cell {
      width: 28px;
      height: 28px;
      border-left: 1px solid #334155;
      background: #e5e7eb;
    }
    .cell:first-child { border-left: 0; }
    .cell.red { background: var(--danger); }

    .composer {
      border-top: 1px solid var(--border);
      padding: 16px;
      background: #fff;
      display: grid;
      gap: 10px;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    textarea {
      width: 100%;
      min-height: 76px;
      max-height: 220px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
    }
    textarea:focus { border-color: #a5b4fc; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12); }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .widget { height: 96vh; border-radius: 18px; }
      .header { padding: 14px; align-items: start; flex-direction: column; }
      .input-row { grid-template-columns: 1fr; }
      .math-block { font-size: 22px; }
      .mixed-number { font-size: 24px; }
      .cell { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <div class="title-wrap">
        <div class="badge">🧮</div>
        <div>
          <h1 class="title">סוכן מתמטיקה לכיתות ה׳–ו׳</h1>
          <p class="subtitle">פינג־פונג, הסבר פשוט, הצגת ביטויים משמאל לימין ושברים תקינים</p>
        </div>
      </div>
      <div class="controls">
        <select id="modeSelect" aria-label="מצב הדגמה">
          <option value="demo">מצב הדגמה</option>
          <option value="api">מצב API</option>
        </select>
        <label class="upload-label">📷 העלאת תמונה
          <input id="imageInput" type="file" accept="image/*" />
        </label>
        <button class="btn" id="clearBtn" type="button">ניקוי שיחה</button>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="composer">
      <div class="hint">
        <span>דוגמאות: "איך כותבים שתיים וחמש שישיות במספרים?" · "לא הבנתי איך מחברים חצי ושליש"</span>
        <span id="imageStatus">לא הועלתה תמונה</span>
      </div>
      <div class="input-row">
        <textarea id="userInput" placeholder="כתבו כאן שאלה או קושי. אפשר גם לצרף צילום של תרגיל."></textarea>
        <button class="btn primary" id="sendBtn" type="button">שליחה</button>
      </div>
      <div class="footer-note">הטמעה באתר: אפשר לשמור את הקובץ, להעלות ל-Vercel/Netlify, ואז להטמיע ב-Canva דרך Embed.</div>
    </div>
  </div>

  <template id="welcomeTemplate">
    <div>
      <span class="sender">הסוכן</span>
      מה תרצה שאעזור לך בו? אפשר להעלות צילום של תרגיל או לכתוב את הנושא.
    </div>
  </template>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const imageInput = document.getElementById('imageInput');
    const imageStatus = document.getElementById('imageStatus');
    const modeSelect = document.getElementById('modeSelect');

    let uploadedImage = null;

    const messages = [];

    addMessage('agent', document.getElementById('welcomeTemplate').innerHTML, true);

    clearBtn.addEventListener('click', () => {
      messages.length = 0;
      chat.innerHTML = '';
      uploadedImage = null;
      imageInput.value = '';
      imageStatus.textContent = 'לא הועלתה תמונה';
      addMessage('agent', document.getElementById('welcomeTemplate').innerHTML, true);
    });

    imageInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      uploadedImage = await fileToDataUrl(file);
      imageStatus.textContent = `הועלתה תמונה: ${file.name}`;
      addMessage('system', `<span class="sender">מערכת</span>התמונה הועלתה בהצלחה.`, true);
    });

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text && !uploadedImage) return;

      addMessage('student', `<span class="sender">התלמיד</span>${escapeHtml(text || 'נשלחה תמונה')}`, true);
      messages.push({ role: 'user', text, image: uploadedImage });
      userInput.value = '';

      sendBtn.disabled = true;
      sendBtn.textContent = 'שולח...';

      try {
        let response;
        if (modeSelect.value === 'api') {
          response = await getAgentReplyFromApi(messages);
        } else {
          response = await getDemoReply(text, uploadedImage);
        }
        addMessage('agent', renderStructuredResponse(response), false);
        messages.push({ role: 'assistant', structured: response });
      } catch (error) {
        addMessage('system', `<span class="sender">שגיאה</span>${escapeHtml(error.message || 'אירעה שגיאה לא צפויה.')}`, true);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'שליחה';
      }
    }

    function addMessage(role, html, isRaw = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = isRaw ? html : html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderStructuredResponse(data) {
      const parts = [];
      parts.push('<span class="sender">הסוכן</span>');

      if (data.text) parts.push(`<div>${escapeHtml(data.text)}</div>`);

      if (Array.isArray(data.mathBlocks)) {
        for (const expr of data.mathBlocks) {
          parts.push(`<div class="math-block">${escapeHtml(expr)}</div>`);
        }
      }

      if (data.mixedNumber) {
        const { whole, numerator, denominator } = data.mixedNumber;
        parts.push(`
          <div class="mixed-number" aria-label="מספר מעורב">
            <span class="whole">${escapeHtml(String(whole))}</span>
            <span class="fraction">
              <span class="top">${escapeHtml(String(numerator))}</span>
              <span class="bar"></span>
              <span class="bottom">${escapeHtml(String(denominator))}</span>
            </span>
          </div>
        `);
      }

      if (data.fractionWord) {
        parts.push(`<div class="fraction-word">${escapeHtml(data.fractionWord)}</div>`);
      }

      if (data.fractionVisual) {
        const { totalParts, coloredParts, title } = data.fractionVisual;
        const cells = Array.from({ length: totalParts }, (_, i) =>
          `<div class="cell ${i < coloredParts ? 'red' : ''}"></div>`
        ).join('');
        parts.push(`
          <div class="fraction-visual">
            ${title ? `<div>${escapeHtml(title)}</div>` : ''}
            <div class="rect-row">${cells}</div>
          </div>
        `);
      }

      if (Array.isArray(data.prompts)) {
        for (const prompt of data.prompts) {
          parts.push(`<div>${escapeHtml(prompt)}</div>`);
        }
      }

      return parts.join('');
    }

    async function getDemoReply(text, image) {
      const t = (text || '').trim();

      if (image && !t) {
        return {
          text: 'קיבלתי את התמונה. אם יש יותר מתרגיל אחד, כתוב לי על איזה תרגיל מדובר.',
          prompts: ['על איזה תרגיל בתמונה מדובר?']
        };
      }

      if (!image && t) {
  return {
    text: 'קיבלתי את השאלה שלך.',
    prompts: ['בוא נתקדם יחד. מה בדיוק לא ברור לך?']
  };
}
      
      if (/שתיים\s*וחמש\s*שישיות|2\s*ו.?\s*חמש\s*שישיות/.test(t)) {
        return {
          text: 'כך כותבים את המספר המעורב במספרים:',
          mixedNumber: { whole: 2, numerator: 5, denominator: 6 },
          prompts: ['רוצה שאכתוב לך גם איך מקריאים אותו?']
        };
      }

      if (/שלוש\s*שמיניות|3\s*שמיניות/.test(t)) {
        return {
          text: 'כך אפשר להמחיש שלוש שמיניות בעזרת מלבן אחד שמחולק ל־8 חלקים שווים:',
          fractionVisual: { totalParts: 8, coloredParts: 3, title: '3 מתוך 8 חלקים צבועים באדום' },
          prompts: ['כמה חלקים נשארו לא צבועים?']
        };
      }

      if (/אחד\s*ועוד\s*חמש|1\s*\+\s*5/.test(t)) {
        return {
          text: 'הביטוי המתמטי מוצג משמאל לימין:',
          mathBlocks: ['1 + 5 = 6']
        };
      }

      if (/חצי.*שליש|שליש.*חצי/.test(t)) {
        return {
          text: 'לפני שמחברים, צריך לבדוק אם החלקים באותו גודל. חצי ושליש הם לא אותו גודל.',
          prompts: ['לדעתך, נוכל לחבר אותם מיד, או שצריך קודם להפוך אותם לאותו מכנה?']
        };
      }

      if (/לא מבין|לא מבינה|קשה לי|נתקעתי/.test(t)) {
        return {
          text: 'בסדר גמור, נתקדם יחד שלב־שלב.',
          prompts: ['מה הצעד הראשון שנראה לך שכדאי לעשות?']
        };
      }

      return {
        text: 'אני כאן כדי לעזור. אעבוד איתך בשאלה אחת בכל פעם, ואציג ביטויים מתמטיים בצורה ברורה משמאל לימין.',
        prompts: ['מה בדיוק לא ברור לך?']
      };
    }

    async function getAgentReplyFromApi(history) {
      // מחליפים את ה-URL בשרת שלכם.
      // דוגמה: https://your-vercel-project.vercel.app/api/math-agent
      const endpoint = window.MATH_AGENT_API_URL || '/api/math-agent';
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });

      if (!response.ok) {
        const text = await response.text().catch(() => '');
        throw new Error(text || 'שרת הסוכן לא זמין כרגע. עברו למצב הדגמה או חברו endpoint אמיתי.');
      }

      return response.json();
    }

    function fileToDataUrl(file)(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
  <!--
  =========================
  BACKEND EXAMPLE FOR VERCEL
  =========================

  צרו קובץ בשם api/math-agent.js עם התוכן הבא,
  העלו את הפרויקט ל-Vercel, ואז הגדירו ב-widget:
  window.MATH_AGENT_API_URL = 'https://YOUR-PROJECT.vercel.app/api/math-agent'

  ---------- api/math-agent.js ----------
  import OpenAI from 'openai';

  const client = new OpenAI({ apiKey: process.env.OPENAI_API_KEY });

  const SYSTEM_PROMPT = `
  אתה מורה פרטי למתמטיקה עבור תלמידי כיתות ה׳–ו׳.
  אתה עוזר רק דרך שאלה אחת בכל פעם.
  אל תיתן פתרון מלא מיד.
  הצג כל ביטוי מתמטי בשורה נפרדת ומשמאל לימין.
  לעולם אל תכתוב שברים עם /.
  אם יש מספר מעורב, החזר אותו במבנה JSON:
  {"text":"...","mixedNumber":{"whole":2,"numerator":5,"denominator":6}}
  אם יש ביטוי מתמטי, החזר אותו ב-array בשם mathBlocks.
  אם יש המחשת שבר, החזר:
  {"fractionVisual":{"totalParts":8,"coloredParts":3,"title":"..."}}
  החזר תמיד JSON תקין בלבד, בלי markdown.
  `;

  function historyToInput(history = []) {
    return history.flatMap((item) => {
      if (item.role === 'assistant' && item.structured) {
        return [{ role: 'assistant', content: JSON.stringify(item.structured) }];
      }

      const content = [];
      if (item.text) content.push({ type: 'input_text', text: item.text });
      if (item.image && typeof item.image === 'string') {
        content.push({ type: 'input_image', image_url: item.image });
      }

      return content.length ? [{ role: item.role === 'user' ? 'user' : 'assistant', content }] : [];
    });
  }

  export default async function handler(req, res) {
    if (req.method !== 'POST') {
      res.status(405).send('Method not allowed');
      return;
    }

    try {
      const history = Array.isArray(req.body?.history) ? req.body.history : [];

      const response = await client.responses.create({
        model: 'gpt-5.3',
        input: [
          {
            role: 'system',
            content: [{ type: 'input_text', text: SYSTEM_PROMPT }]
          },
          ...historyToInput(history)
        ],
        text: {
          format: {
            type: 'json_schema',
            name: 'math_agent_response',
            schema: {
              type: 'object',
              additionalProperties: false,
              properties: {
                text: { type: 'string' },
                mathBlocks: {
                  type: 'array',
                  items: { type: 'string' }
                },
                mixedNumber: {
                  type: 'object',
                  additionalProperties: false,
                  properties: {
                    whole: { type: 'number' },
                    numerator: { type: 'number' },
                    denominator: { type: 'number' }
                  },
                  required: ['whole', 'numerator', 'denominator']
                },
                fractionWord: { type: 'string' },
                fractionVisual: {
                  type: 'object',
                  additionalProperties: false,
                  properties: {
                    totalParts: { type: 'number' },
                    coloredParts: { type: 'number' },
                    title: { type: 'string' }
                  },
                  required: ['totalParts', 'coloredParts']
                },
                prompts: {
                  type: 'array',
                  items: { type: 'string' }
                }
              },
              required: ['text']
            }
          }
        }
      });

      const output = response.output_text || '{"text":"אירעה שגיאה בהבנת התשובה."}';
      res.status(200).json(JSON.parse(output));
    } catch (error) {
      console.error(error);
      res.status(500).send('Server error');
    }
  }
  ---------- end api/math-agent.js ----------
  -->
</body>
</html>
